name: Merge After Green

on:
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  merge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ inputs.pr }}
    steps:
      - name: Wait for required checks
        run: gh pr checks "$PR_NUMBER" --required --watch --fail-fast --interval 10

      - name: Enable auto-merge
        run: gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
