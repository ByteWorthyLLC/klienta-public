<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="240" viewBox="0 0 1280 240">
  <!-- Background -->
  <rect width="1280" height="240" fill="#0F172A"/>

  <!-- Left: product name + tagline -->
  <text x="64" y="116" font-family="'Courier New', Courier, monospace" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Klienta</text>
  <text x="64" y="152" font-family="'Courier New', Courier, monospace" font-size="18" fill="#94A3B8">White-label client portals for AI agencies.</text>

  <!-- Right: three layered tenant rectangles (amber at 60%, 40%, 20% opacity) -->
  <!-- Back rectangle (20% opacity) -->
  <rect x="960" y="48" width="240" height="128" rx="16" fill="#D4A574" fill-opacity="0.20"/>
  <!-- Mid rectangle (40% opacity) -->
  <rect x="936" y="68" width="240" height="104" rx="14" fill="#D4A574" fill-opacity="0.40"/>
  <!-- Front rectangle (60% opacity) -->
  <rect x="912" y="88" width="240" height="80" rx="12" fill="#D4A574" fill-opacity="0.60"/>

  <!-- Bottom-left: ByteWorthy label -->
  <text x="64" y="218" font-family="'Courier New', Courier, monospace" font-size="14" fill="#475569">{byteworthy}</text>
</svg>
